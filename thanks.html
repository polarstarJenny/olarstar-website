<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Polarstar Chemical</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 480px;
      box-shadow: rgba(50,50,93,0.08) 0 16px 32px -12px;
    }
    .check { font-size: 48px; margin-bottom: 16px; }
    h1 { font-weight: 300; color: #061b31; font-size: 28px; margin-bottom: 12px; }
    p { color: #64748d; font-weight: 300; line-height: 1.6; margin-bottom: 24px; }
    a {
      display: inline-block; padding: 10px 24px;
      background: #1a56db; color: #fff; text-decoration: none;
      border-radius: 6px; font-weight: 500; font-size: 14px;
    }
    a:hover { background: #1e40af; }
  </style>
</head>
<body>
<div class="card">
  <div class="check">✅</div>
  <h1>Thank You!</h1>
  <p>Your inquiry has been received. Our team will get back to you within 24 hours.</p>
  <a href="/olarstar-website/">← Back to Home</a>
</div>
</body>
</html>
